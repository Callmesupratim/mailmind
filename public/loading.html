<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mailmind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0e0e0e;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-mark {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { color: #fff; }
    .logo-word {
      font-size: 22px; font-weight: 700; letter-spacing: -0.03em; color: #fff;
    }
    .logo-word span { color: #4ade80; }
    .status {
      font-size: 12px; color: #555; letter-spacing: 0.03em;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid #1f1f1f;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </div>
      <span class="logo-word">mail<span>mind</span></span>
    </div>
    <div class="spinner"></div>
    <div class="status">Starting up…</div>
  </div>
</body>
</html>
